name: Build Android APK

on:
  push:
    branches: [ main, codex-compose-rebuild ]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew --no-daemon testDebugUnitTest 2>&1 | tee unit-test.log

      - name: Android lint
        shell: bash
        run: |
          set -o pipefail
          ./gradlew --no-daemon lintDebug 2>&1 | tee lint.log

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          ./gradlew --no-daemon assembleDebug 2>&1 | tee assemble.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: WorkTracker-build-logs
          path: |
            unit-test.log
            lint.log
            assemble.log
            app/build/intermediates/lint_intermediate_text_report/**/lint-results-debug.txt
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WorkTracker-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
