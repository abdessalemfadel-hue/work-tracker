plugins { id 'com.android.application' }

android {
    namespace 'com.abdessalem.worktracker'
    compileSdk 34

    defaultConfig {
        applicationId 'com.abdessalem.worktracker'
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName '2.0.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}
